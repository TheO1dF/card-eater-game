<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CardEater</title>
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <main class="app">
      <section class="table">
        <div class="hud">
          <div class="hud-panel"><div class="hud-label">轮次 / 阶段目标</div><div class="hud-value" id="roundValue">1 / 15</div></div>
          <div class="hud-panel"><div class="hud-label">耗时</div><div class="hud-value" id="timerValue" style="color:var(--accent-discard); font-variant-numeric: tabular-nums;">0.0s</div></div>
          <div class="hud-panel"><div class="hud-label">剩余牌</div><div class="hud-value" id="remainingValue">10</div></div>
          <div class="hud-panel"><div class="hud-label">总分</div><div class="hud-value" id="scoreValue">0</div></div>
          <div class="hud-panel"><div class="hud-label">金币</div><div class="hud-value" id="goldValue">0</div></div>
        </div>

        <div class="scene">
          <div class="deck-stage">
            <div class="stack-shadow"></div>
            <div class="card-stack" id="cardStack"></div>
            <div class="card-feedback">
              <div class="feedback-pill eat" id="eatHint">向下滑动：吃掉</div>
              <div class="feedback-pill discard" id="discardHint">向上滑动：丢弃</div>
            </div>
            <div class="hint">拖拽卡牌；向上或向下滑动触发动作</div>
          </div>
        </div>

        <!-- 3,2,1 倒计时遮罩 -->
        <div class="overlay" id="countdownOverlay" style="z-index: 50; background: rgba(0,0,0,0.8);">
          <div id="countdownText" style="font-size: 120px; font-weight: 900; color: #4ade80; text-shadow: 0 0 30px rgba(74,222,128,0.8); transition: transform 0.2s;">开始 !</div>
        </div>

        <!-- 规则三选一 (加入下个目标提示) -->
        <div class="overlay" id="ruleDraft">
          <div class="overlay-panel">
            <h2 class="overlay-title" id="ruleDraftTitle">选择一条规则</h2>
            <div class="overlay-tip" id="ruleDraftTip">
              从随机三选一中挑选一条，本轮生效。<br>
              <strong id="draftTargetText" style="display:inline-block; margin-top:8px; color:var(--accent-discard); background: rgba(249,115,22,0.1); padding: 4px 12px; border-radius: 8px;">🎯 下个目标：第 5 轮达到 100 分</strong>
            </div>
            <div class="option-grid" id="ruleDraftList"></div>
          </div>
        </div>

        <!-- 商店 (保持原样) -->
        <div class="overlay" id="shopPanel">
          <div class="overlay-panel">
            <h2 class="overlay-title">商店</h2>
            <div class="overlay-tip" id="shopMessage">购买卡牌增强卡组，或精简卡牌。</div>
            <div class="hud hud-inline">
              <div class="hud-panel"><div class="hud-label">金币</div><div class="hud-value" id="shopGold">0</div></div>
              <div class="hud-panel"><div class="hud-label">删牌费用</div><div class="hud-value" id="shopDeleteCost">0</div></div>
            </div>
            <div class="option-grid" id="shopList"></div>
            <div class="shop-actions" style="margin-top: 24px; justify-content: center;">
              <button class="shop-action" id="shopContinue" type="button" style="background: var(--accent-eat); color: #fff; font-weight: bold;">结束商店，进入下一轮</button>
            </div>
          </div>
        </div>

        <!-- 全新：账单式结算界面 -->
        <div class="overlay" id="roundSummary">
          <div class="overlay-panel">
            <h2 class="overlay-title" id="summaryTitle">本轮结算</h2>
            <div class="overlay-tip" id="summaryTip">分步结算详情</div>
            
            <!-- 账单列表容器：方便以后做逐行弹出的动画 -->
            <div id="summaryBreakdownList" style="display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
              <!-- JS 动态注入账单条目 -->
            </div>
            
            <!-- 隐藏的已选规则容器 -->
            <div id="activeRulesContainer" style="grid-column: 1 / -1; margin-bottom: 10px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; display: none;">
              <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">本局已叠加的所有规则：</div>
              <ul id="activeRulesList" style="margin:0; padding-left: 18px; font-size: 13px; color: var(--text); line-height: 1.6;"></ul>
            </div>

            <div class="shop-actions" style="margin-top: 12px; flex-direction: column; gap: 10px;">
              <button class="shop-action" id="viewRulesBtn" type="button" style="background: transparent; border: 1px solid var(--muted); color: var(--text);">👀 查看当前已选规则</button>
              <button class="shop-action" id="summaryContinueBtn" type="button" style="background: var(--accent-eat); color: #fff; font-weight: bold;">确认结算，进入商店</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
